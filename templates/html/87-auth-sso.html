<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta http-equiv="X-UA-Compatible" content="ie=edge"/>
<title>SSO Login | TailAdmin</title>
<link rel="stylesheet" href="tailwind-production.css"/>
<link rel="stylesheet" href="pro-styles.css"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
body{font-family:Outfit,system-ui,sans-serif}
.auth-wrapper{min-height:100vh;display:flex;align-items:center;justify-content:center}
.auth-card{width:100%;max-width:480px;padding:2.5rem;border-radius:1rem;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.04)}
.dark .auth-card{background:#1e293b;box-shadow:0 1px 3px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.2)}
.auth-illustration{display:flex;align-items:center;justify-content:center;min-height:200px}
.form-group{margin-bottom:1.25rem}
.form-label{display:block;margin-bottom:.375rem;font-size:.875rem;font-weight:500;color:#334155}
.dark .form-label{color:#cbd5e1}
.form-input{width:100%;padding:.625rem .875rem;border:1.5px solid #e2e8f0;border-radius:.5rem;font-size:.875rem;transition:border-color .15s,box-shadow .15s;background:#fff;color:#0f172a}
.form-input:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.dark .form-input{background:#0f172a;border-color:#334155;color:#e2e8f0}
.dark .form-input:focus{border-color:#818cf8;box-shadow:0 0 0 3px rgba(129,140,248,.15)}
.form-input.error{border-color:#ef4444;box-shadow:0 0 0 3px rgba(239,68,68,.1)}
.form-input.success{border-color:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.1)}
.form-error{font-size:.75rem;color:#ef4444;margin-top:.25rem;display:none}
.form-error.visible{display:block}
.form-hint{font-size:.75rem;color:#94a3b8;margin-top:.25rem}
.password-wrapper{position:relative}
.password-toggle{position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#94a3b8;padding:.25rem}
.password-toggle:hover{color:#64748b}
.btn-primary{width:100%;padding:.75rem;border:none;border-radius:.5rem;font-size:.875rem;font-weight:600;color:#fff;background:#6366f1;cursor:pointer;transition:background .15s,transform .1s}
.btn-primary:hover{background:#4f46e5}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
.btn-outline{width:100%;padding:.75rem;border:1.5px solid #e2e8f0;border-radius:.5rem;font-size:.875rem;font-weight:500;color:#334155;background:#fff;cursor:pointer;transition:background .15s,border-color .15s}
.btn-outline:hover{background:#f8fafc;border-color:#cbd5e1}
.dark .btn-outline{background:#1e293b;border-color:#334155;color:#e2e8f0}
.dark .btn-outline:hover{background:#334155;border-color:#475569}
.divider{display:flex;align-items:center;gap:.75rem;margin:1.5rem 0;color:#94a3b8;font-size:.8125rem}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:#e2e8f0}
.dark .divider::before,.dark .divider::after{background:#334155}
.otp-input{width:3rem;height:3.5rem;text-align:center;font-size:1.25rem;font-weight:600;border:1.5px solid #e2e8f0;border-radius:.5rem;background:#fff;color:#0f172a;transition:border-color .15s,box-shadow .15s}
.otp-input:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.dark .otp-input{background:#0f172a;border-color:#334155;color:#e2e8f0}
.dark .otp-input:focus{border-color:#818cf8}
.checkbox-wrapper{display:flex;align-items:center;gap:.5rem}
.checkbox-wrapper input[type=checkbox]{width:1rem;height:1rem;accent-color:#6366f1;cursor:pointer}
.strength-bar{height:4px;border-radius:2px;background:#e2e8f0;margin-top:.5rem;overflow:hidden}
.strength-bar .fill{height:100%;border-radius:2px;transition:width .3s,background .3s}
.dark .strength-bar{background:#334155}
.social-btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;padding:.625rem 1rem;border:1.5px solid #e2e8f0;border-radius:.5rem;font-size:.8125rem;font-weight:500;color:#334155;background:#fff;cursor:pointer;transition:background .15s}
.social-btn:hover{background:#f8fafc}
.dark .social-btn{background:#1e293b;border-color:#334155;color:#e2e8f0}
.dark .social-btn:hover{background:#334155}
.link{color:#6366f1;font-weight:500;text-decoration:none;font-size:.875rem;transition:color .15s}
.link:hover{color:#4f46e5;text-decoration:underline}
.dark .link{color:#818cf8}
.dark .link:hover{color:#a5b4fc}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .4s ease-out}
@keyframes countUp{from{opacity:0}to{opacity:1}}
@media(prefers-reduced-motion:reduce){.fade-up{animation:none}}
@media(max-width:640px){.auth-card{margin:1rem;padding:1.5rem;border-radius:.75rem}.auth-split{flex-direction:column}.auth-split .auth-illustration{min-height:160px}}
</style>

</head>
<body class="bg-slate-50 dark:bg-slate-950 dark:text-white">
<div class="auth-wrapper p-4 sm:p-6">
<div class="auth-card fade-up" style="max-width:520px">
<a href="01-main-dashboard.html" class="inline-flex items-center gap-1 text-sm text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 mb-6 transition-colors">
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
Back to dashboard
</a>
<div class="mb-6 text-center">
<h1 class="text-2xl font-bold text-slate-900 dark:text-white mb-1">Sign in with SSO</h1>
<p class="text-sm text-slate-500 dark:text-slate-400">Use your organization's identity provider to sign in</p>
</div>
<div class="space-y-3 mb-6">
<button type="button" class="btn-outline flex items-center gap-3" onclick="handleSSO('Okta')">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="4" stroke="#0076CE" stroke-width="2"/><circle cx="12" cy="12" r="5" fill="#0076CE"/></svg>
<span class="flex-1 text-left">Continue with Okta</span>
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
</button>
<button type="button" class="btn-outline flex items-center gap-3" onclick="handleSSO('Azure AD')">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="4" stroke="#00a4ef" stroke-width="2"/><path d="M11 7l-5 5 5 5M13 7l5 5-5 5" stroke="#00a4ef" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
<span class="flex-1 text-left">Continue with Azure AD</span>
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
</button>
<button type="button" class="btn-outline flex items-center gap-3" onclick="handleSSO('Google Workspace')">
<svg width="20" height="20" viewBox="0 0 18 18" fill="none"><path d="M17.64 9.2c0-.74-.07-1.45-.2-2.13H9v4.03h4.87a4.16 4.16 0 01-1.8 2.73v2.27h2.91c1.7-1.57 2.66-3.88 2.66-6.9z" fill="#4285F4"/><path d="M9 18c2.43 0 4.47-.8 5.96-2.17l-2.91-2.27c-.8.54-1.83.86-3.05.86-2.35 0-4.34-1.58-5.05-3.71H.96v2.34A8.99 8.99 0 009 18z" fill="#34A853"/><path d="M3.95 10.71A5.4 5.4 0 013.67 9c0-.6.1-1.17.28-1.71V4.95H.96A8.99 8.99 0 000 9c0 1.45.35 2.82.96 4.05l2.99-2.34z" fill="#FBBC05"/><path d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.58-2.59C13.46.89 11.43 0 9 0 5.48 0 2.47 2.02.96 4.95l2.99 2.34C4.66 5.16 6.65 3.58 9 3.58z" fill="#EB4335"/></svg>
<span class="flex-1 text-left">Continue with Google Workspace</span>
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
</button>
<button type="button" class="btn-outline flex items-center gap-3" onclick="handleSSO('SAML')">
<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="4" stroke="#6366f1" stroke-width="2"/><path d="M8 12h8M12 8v8" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/></svg>
<span class="flex-1 text-left">Continue with SAML</span>
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
</button>
</div>
<div class="divider">or enter your company domain</div>
<form id="sso-form" novalidate onsubmit="return handleDomainSSO(event)">
<div class="form-group">
<label class="form-label" for="company_domain">Company Domain</label>
<input type="text" id="company_domain" name="company_domain" class="form-input" placeholder="acme-corp" autocomplete="organization"/>
<p class="form-error" id="company_domain-error"></p>
</div>
<button type="submit" class="btn-primary" id="sso-btn">Continue with SSO</button>
</form>
<div class="divider">or</div>
<div class="text-center">
<a href="81-auth-login.html" class="link">Sign in with email and password</a>
</div>
<p class="text-center text-xs text-slate-400 dark:text-slate-500 mt-5">By continuing, you agree to our <a href="#" class="link text-xs">Terms</a> and <a href="#" class="link text-xs">Privacy Policy</a></p>
</div>
</div>
<script src="common-loader.js"></script>
<script>

function handleSSO(provider){
  showToast('Redirecting to '+provider+'...','info');
  setTimeout(function(){showToast(provider+' authentication successful!','success');setTimeout(function(){window.location.href='01-main-dashboard.html'},1000)},1500);
}
function handleDomainSSO(e){
  e.preventDefault();
  var domain=document.getElementById('company_domain');
  if(!domain.value.trim()||!domain.value.trim().match(/^[a-z0-9-]+$/i)){showFieldError('company_domain','Please enter a valid company domain');return false}
  clearFieldError('company_domain');
  var btn=document.getElementById('sso-btn');
  btn.disabled=true;btn.textContent='Connecting...';
  setTimeout(function(){showToast('Redirecting to SSO portal for '+domain.value.trim()+'...','info');setTimeout(function(){window.location.href='01-main-dashboard.html'},1500)},1200);
  return false;
}

</script>
</body>
</html>
