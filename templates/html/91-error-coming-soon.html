<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Coming Soon | TailAdmin</title>
<link rel="stylesheet" href="tailwind-production.css"/>
<link rel="stylesheet" href="pro-styles.css"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
body{font-family:Outfit,system-ui,sans-serif}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .4s ease-out}
@media(prefers-reduced-motion:reduce){.fade-up{animation:none}}

</style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 dark:text-white">
<div class="min-h-screen flex items-center justify-center p-6">
<div class="text-center fade-up">
<div class="mb-6"><svg width="120" height="120" viewBox="0 0 120 120" fill="none" class="mx-auto"><circle cx="60" cy="60" r="50" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/><path d="M60 35v25l15 10" stroke="#6366f1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
<h1 class="text-3xl font-bold text-slate-900 dark:text-white mb-2">Coming Soon</h1>
<p class="text-slate-500 dark:text-slate-400 mb-6 max-w-md mx-auto">We are working on something exciting. Stay tuned for our launch!</p>
<div class="flex gap-4 justify-center mb-8" id="countdown"><div class="bg-white dark:bg-slate-900 rounded-lg border border-slate-200 dark:border-slate-800 p-3 w-16"><p class="text-2xl font-bold text-slate-900 dark:text-white" id="cd-days">14</p><p class="text-xs text-slate-400">Days</p></div><div class="bg-white dark:bg-slate-900 rounded-lg border border-slate-200 dark:border-slate-800 p-3 w-16"><p class="text-2xl font-bold text-slate-900 dark:text-white" id="cd-hours">08</p><p class="text-xs text-slate-400">Hours</p></div><div class="bg-white dark:bg-slate-900 rounded-lg border border-slate-200 dark:border-slate-800 p-3 w-16"><p class="text-2xl font-bold text-slate-900 dark:text-white" id="cd-mins">42</p><p class="text-xs text-slate-400">Mins</p></div><div class="bg-white dark:bg-slate-900 rounded-lg border border-slate-200 dark:border-slate-800 p-3 w-16"><p class="text-2xl font-bold text-slate-900 dark:text-white" id="cd-secs">15</p><p class="text-xs text-slate-400">Secs</p></div></div>
<form class="flex gap-2 max-w-sm mx-auto" onsubmit="event.preventDefault();showToast('You will be notified!','success')"><input type="email" class="form-input flex-1" placeholder="Enter your email"/><button type="submit" class="px-4 py-2 bg-indigo-500 text-white text-sm font-medium rounded-lg hover:bg-indigo-600 transition-colors whitespace-nowrap">Notify Me</button></form>
</div>
</div>
<script src="common-loader.js"></script>
<script>

var target=new Date();target.setDate(target.getDate()+14);
function updateCountdown(){
  var now=new Date(),diff=target-now;
  if(diff<=0)return;
  var d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
  document.getElementById('cd-days').textContent=d;
  document.getElementById('cd-hours').textContent=String(h).padStart(2,'0');
  document.getElementById('cd-mins').textContent=String(m).padStart(2,'0');
  document.getElementById('cd-secs').textContent=String(s).padStart(2,'0');
}
setInterval(updateCountdown,1000);updateCountdown();

</script>
</body>
</html>
