body{font-family:Outfit,system-ui,sans-serif}
.no-scrollbar::-webkit-scrollbar{display:none}
.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .4s ease-out}
@media(prefers-reduced-motion:reduce){.fade-up{animation:none}}
.chart-card{background:#fff;border:1px solid #e2e8f0;border-radius:.75rem;padding:1.5rem;margin-bottom:1.5rem}
.dark .chart-card{background:#1e293b;border-color:#334155}
.chart-card h3{font-size:1rem;font-weight:600;color:#0f172a;margin-bottom:.25rem}
.dark .chart-card h3{color:#e2e8f0}
.chart-card p{font-size:.8125rem;color:#94a3b8;margin-bottom:1rem}
.chart-container{position:relative;width:100%}
.chart-container svg{width:100%;height:auto}
.chart-tooltip{position:absolute;background:#1e293b;color:#fff;padding:.375rem .75rem;border-radius:.375rem;font-size:.75rem;pointer-events:none;z-index:10;white-space:nowrap}
.legend{display:flex;flex-wrap:wrap;gap:1rem;margin-top:1rem}
.legend-item{display:flex;align-items:center;gap:.375rem;font-size:.75rem;color:#64748b}
.legend-dot{width:8px;height:8px;border-radius:50%}
.sparkline-card{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;background:#fff;border:1px solid #e2e8f0;border-radius:.75rem;margin-bottom:1rem}
.dark .sparkline-card{background:#1e293b;border-color:#334155}
.map-container{position:relative;width:100%;overflow:hidden;border-radius:.5rem}
.map-marker{cursor:pointer;transition:transform .15s}
.map-marker:hover{transform:scale(1.3)}
.map-legend{display:flex;flex-wrap:wrap;gap:.75rem;margin-top:1rem}
.map-legend-item{display:flex;align-items:center;gap:.375rem;font-size:.75rem;color:#64748b}
</style>

</head>
