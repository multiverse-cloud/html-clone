<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#465fff"/>
<title>Maps Overview | TailAdmin</title>
<link rel="stylesheet" href="tailwind-production.css"/>
<link rel="stylesheet" href="pro-styles.css"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
body{font-family:Outfit,system-ui,sans-serif}
.no-scrollbar::-webkit-scrollbar{display:none}
.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .4s ease-out}
@media(prefers-reduced-motion:reduce){.fade-up{animation:none}}
.chart-card{background:#fff;border:1px solid #e2e8f0;border-radius:.75rem;padding:1.5rem;margin-bottom:1.5rem}
.dark .chart-card{background:#1e293b;border-color:#334155}
.chart-card h3{font-size:1rem;font-weight:600;color:#0f172a;margin-bottom:.25rem}
.dark .chart-card h3{color:#e2e8f0}
.chart-card p{font-size:.8125rem;color:#94a3b8;margin-bottom:1rem}
.chart-container{position:relative;width:100%}
.chart-container svg{width:100%;height:auto}
.chart-tooltip{position:absolute;background:#1e293b;color:#fff;padding:.375rem .75rem;border-radius:.375rem;font-size:.75rem;pointer-events:none;z-index:10;white-space:nowrap}
.legend{display:flex;flex-wrap:wrap;gap:1rem;margin-top:1rem}
.legend-item{display:flex;align-items:center;gap:.375rem;font-size:.75rem;color:#64748b}
.legend-dot{width:8px;height:8px;border-radius:50%}
.sparkline-card{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;background:#fff;border:1px solid #e2e8f0;border-radius:.75rem;margin-bottom:1rem}
.dark .sparkline-card{background:#1e293b;border-color:#334155}
.map-container{position:relative;width:100%;overflow:hidden;border-radius:.5rem}
.map-marker{cursor:pointer;transition:transform .15s}
.map-marker:hover{transform:scale(1.3)}
.map-legend{display:flex;flex-wrap:wrap;gap:.75rem;margin-top:1rem}
.map-legend-item{display:flex;align-items:center;gap:.375rem;font-size:.75rem;color:#64748b}
</style>

</head>
<body class="bg-slate-50 dark:bg-slate-950 dark:text-white">
<div class="sidebar-overlay fixed inset-0 bg-black/40 z-40 hidden lg:hidden"></div>
<div class="flex h-screen overflow-hidden">
<div class="sidebar-container w-72 flex-shrink-0"></div>
<div class="header-container flex-1 flex flex-col overflow-hidden"></div>
<main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
<nav class="flex items-center gap-2 text-sm text-slate-400 mb-4">
<a href="#" class="hover:text-slate-600 dark:hover:text-slate-300">Home</a><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
<a href="#" class="hover:text-slate-600 dark:hover:text-slate-300">Charts</a><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
<span class="text-slate-700 dark:text-slate-200 font-medium">Maps Overview</span>
</nav>
<div class="mb-6 fade-up">
<h1 class="text-2xl font-bold text-slate-900 dark:text-white mb-1">Maps Overview</h1>
<p class="text-sm text-slate-500 dark:text-slate-400">Interactive SVG maps with markers and metrics</p>
</div>
<div class="chart-card fade-up"><h3>Global User Distribution</h3><p>Active users by region</p>
<div class="map-container" style="background:#f8fafc;border-radius:.5rem;padding:1rem">

<rect width="800" height="400" fill="#f1f5f9" rx="8"/>

<ellipse cx="220" cy="300" rx="40" ry="50" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
<ellipse cx="400" cy="170" rx="60" ry="70" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
<ellipse cx="420" cy="280" rx="50" ry="60" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>

<ellipse cx="640" cy="320" rx="40" ry="30" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1"/>
<g class="map-marker"><circle cx="180" cy="160" r="6" fill="#6366f1" opacity="0.8"/><circle cx="180" cy="160" r="12" fill="#6366f1" opacity="0.2"/><title>New York: 2,847 users</title></g>
<g class="map-marker"><circle cx="200" cy="190" r="6" fill="#6366f1" opacity="0.8"/><circle cx="200" cy="190" r="12" fill="#6366f1" opacity="0.2"/><title>Chicago: 1,203 users</title></g>
<g class="map-marker"><circle cx="380" cy="150" r="6" fill="#22c55e" opacity="0.8"/><circle cx="380" cy="150" r="12" fill="#22c55e" opacity="0.2"/><title>London: 3,421 users</title></g>
<g class="map-marker"><circle cx="420" cy="160" r="6" fill="#22c55e" opacity="0.8"/><circle cx="420" cy="160" r="12" fill="#22c55e" opacity="0.2"/><title>Berlin: 1,856 users</title></g>
<g class="map-marker"><circle cx="560" cy="180" r="6" fill="#f59e0b" opacity="0.8"/><circle cx="560" cy="180" r="12" fill="#f59e0b" opacity="0.2"/><title>Tokyo: 4,102 users</title></g>
<g class="map-marker"><circle cx="580" cy="220" r="6" fill="#f59e0b" opacity="0.8"/><circle cx="580" cy="220" r="12" fill="#f59e0b" opacity="0.2"/><title>Shanghai: 2,945 users</title></g>
<g class="map-marker"><circle cx="620" cy="310" r="6" fill="#8b5cf6" opacity="0.8"/><circle cx="620" cy="310" r="12" fill="#8b5cf6" opacity="0.2"/><title>Sydney: 1,567 users</title></g>
<g class="map-marker"><circle cx="210" cy="290" r="6" fill="#ef4444" opacity="0.8"/><circle cx="210" cy="290" r="12" fill="#ef4444" opacity="0.2"/><title>Sao Paulo: 2,134 users</title></g>
</svg>
</div>
<div class="map-legend"><div class="map-legend-item"><span class="legend-dot" style="background:#6366f1"></span>Americas</div><div class="map-legend-item"><span class="legend-dot" style="background:#22c55e"></span>Europe</div><div class="map-legend-item"><span class="legend-dot" style="background:#f59e0b"></span>Asia</div><div class="map-legend-item"><span class="legend-dot" style="background:#8b5cf6"></span>Oceania</div><div class="map-legend-item"><span class="legend-dot" style="background:#ef4444"></span>South America</div></div></div>
<div class="grid grid-cols-2 lg:grid-cols-4 gap-4 fade-up">
<div class="chart-card" style="padding:1rem;border-left:3px solid #6366f1"><p class="text-xs text-slate-400 mb-1">North America</p><p class="text-lg font-bold text-slate-900 dark:text-white">8,421</p><p class="text-xs text-green-600">+12%</p></div>
<div class="chart-card" style="padding:1rem;border-left:3px solid #22c55e"><p class="text-xs text-slate-400 mb-1">Europe</p><p class="text-lg font-bold text-slate-900 dark:text-white">6,234</p><p class="text-xs text-green-600">+8%</p></div>
<div class="chart-card" style="padding:1rem;border-left:3px solid #f59e0b"><p class="text-xs text-slate-400 mb-1">Asia Pacific</p><p class="text-lg font-bold text-slate-900 dark:text-white">9,876</p><p class="text-xs text-green-600">+24%</p></div>
<div class="chart-card" style="padding:1rem;border-left:3px solid #8b5cf6"><p class="text-xs text-slate-400 mb-1">Rest of World</p><p class="text-lg font-bold text-slate-900 dark:text-white">3,567</p><p class="text-xs text-green-600">+5%</p></div>
</div>
</main>
