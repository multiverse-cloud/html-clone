<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta http-equiv="X-UA-Compatible" content="ie=edge"/>
<title>Sign Up | TailAdmin</title>
<link rel="stylesheet" href="tailwind-production.css"/>
<link rel="stylesheet" href="pro-styles.css"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
body{font-family:Outfit,system-ui,sans-serif}
.auth-wrapper{min-height:100vh;display:flex;align-items:center;justify-content:center}
.auth-card{width:100%;max-width:480px;padding:2.5rem;border-radius:1rem;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.04)}
.dark .auth-card{background:#1e293b;box-shadow:0 1px 3px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.2)}
.auth-illustration{display:flex;align-items:center;justify-content:center;min-height:200px}
.form-group{margin-bottom:1.25rem}
.form-label{display:block;margin-bottom:.375rem;font-size:.875rem;font-weight:500;color:#334155}
.dark .form-label{color:#cbd5e1}
.form-input{width:100%;padding:.625rem .875rem;border:1.5px solid #e2e8f0;border-radius:.5rem;font-size:.875rem;transition:border-color .15s,box-shadow .15s;background:#fff;color:#0f172a}
.form-input:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.dark .form-input{background:#0f172a;border-color:#334155;color:#e2e8f0}
.dark .form-input:focus{border-color:#818cf8;box-shadow:0 0 0 3px rgba(129,140,248,.15)}
.form-input.error{border-color:#ef4444;box-shadow:0 0 0 3px rgba(239,68,68,.1)}
.form-input.success{border-color:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.1)}
.form-error{font-size:.75rem;color:#ef4444;margin-top:.25rem;display:none}
.form-error.visible{display:block}
.form-hint{font-size:.75rem;color:#94a3b8;margin-top:.25rem}
.password-wrapper{position:relative}
.password-toggle{position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#94a3b8;padding:.25rem}
.password-toggle:hover{color:#64748b}
.btn-primary{width:100%;padding:.75rem;border:none;border-radius:.5rem;font-size:.875rem;font-weight:600;color:#fff;background:#6366f1;cursor:pointer;transition:background .15s,transform .1s}
.btn-primary:hover{background:#4f46e5}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
.btn-outline{width:100%;padding:.75rem;border:1.5px solid #e2e8f0;border-radius:.5rem;font-size:.875rem;font-weight:500;color:#334155;background:#fff;cursor:pointer;transition:background .15s,border-color .15s}
.btn-outline:hover{background:#f8fafc;border-color:#cbd5e1}
.dark .btn-outline{background:#1e293b;border-color:#334155;color:#e2e8f0}
.dark .btn-outline:hover{background:#334155;border-color:#475569}
.divider{display:flex;align-items:center;gap:.75rem;margin:1.5rem 0;color:#94a3b8;font-size:.8125rem}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:#e2e8f0}
.dark .divider::before,.dark .divider::after{background:#334155}
.otp-input{width:3rem;height:3.5rem;text-align:center;font-size:1.25rem;font-weight:600;border:1.5px solid #e2e8f0;border-radius:.5rem;background:#fff;color:#0f172a;transition:border-color .15s,box-shadow .15s}
.otp-input:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.dark .otp-input{background:#0f172a;border-color:#334155;color:#e2e8f0}
.dark .otp-input:focus{border-color:#818cf8}
.checkbox-wrapper{display:flex;align-items:center;gap:.5rem}
.checkbox-wrapper input[type=checkbox]{width:1rem;height:1rem;accent-color:#6366f1;cursor:pointer}
.strength-bar{height:4px;border-radius:2px;background:#e2e8f0;margin-top:.5rem;overflow:hidden}
.strength-bar .fill{height:100%;border-radius:2px;transition:width .3s,background .3s}
.dark .strength-bar{background:#334155}
.social-btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;padding:.625rem 1rem;border:1.5px solid #e2e8f0;border-radius:.5rem;font-size:.8125rem;font-weight:500;color:#334155;background:#fff;cursor:pointer;transition:background .15s}
.social-btn:hover{background:#f8fafc}
.dark .social-btn{background:#1e293b;border-color:#334155;color:#e2e8f0}
.dark .social-btn:hover{background:#334155}
.link{color:#6366f1;font-weight:500;text-decoration:none;font-size:.875rem;transition:color .15s}
.link:hover{color:#4f46e5;text-decoration:underline}
.dark .link{color:#818cf8}
.dark .link:hover{color:#a5b4fc}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .4s ease-out}
@keyframes countUp{from{opacity:0}to{opacity:1}}
@media(prefers-reduced-motion:reduce){.fade-up{animation:none}}
@media(max-width:640px){.auth-card{margin:1rem;padding:1.5rem;border-radius:.75rem}.auth-split{flex-direction:column}.auth-split .auth-illustration{min-height:160px}}
</style>

</head>
<body class="bg-slate-50 dark:bg-slate-950 dark:text-white">
<div class="auth-wrapper p-4 sm:p-6">
<div class="auth-card fade-up">
<a href="01-main-dashboard.html" class="inline-flex items-center gap-1 text-sm text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 mb-6 transition-colors">
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
Back to dashboard
</a>
<div class="mb-6">
<h1 class="text-2xl font-bold text-slate-900 dark:text-white mb-1">Create an account</h1>
<p class="text-sm text-slate-500 dark:text-slate-400">Start your journey with a free account</p>
</div>
<div class="grid grid-cols-2 gap-3">
<button type="button" class="social-btn" onclick="showToast('Google OAuth would launch here','info')">
<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M17.64 9.2c0-.74-.07-1.45-.2-2.13H9v4.03h4.87a4.16 4.16 0 01-1.8 2.73v2.27h2.91c1.7-1.57 2.66-3.88 2.66-6.9z" fill="#4285F4"/><path d="M9 18c2.43 0 4.47-.8 5.96-2.17l-2.91-2.27c-.8.54-1.83.86-3.05.86-2.35 0-4.34-1.58-5.05-3.71H.96v2.34A8.99 8.99 0 009 18z" fill="#34A853"/><path d="M3.95 10.71A5.4 5.4 0 013.67 9c0-.6.1-1.17.28-1.71V4.95H.96A8.99 8.99 0 000 9c0 1.45.35 2.82.96 4.05l2.99-2.34z" fill="#FBBC05"/><path d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.58-2.59C13.46.89 11.43 0 9 0 5.48 0 2.47 2.02.96 4.95l2.99 2.34C4.66 5.16 6.65 3.58 9 3.58z" fill="#EB4335"/></svg>
Google
</button>
<button type="button" class="social-btn" onclick="showToast('GitHub OAuth would launch here','info')">
<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
GitHub
</button>
</div><div class="divider">or</div>
<form id="register-form" novalidate onsubmit="return handleRegister(event)">
<div class="grid grid-cols-2 gap-3">
<div class="form-group">
<label class="form-label" for="first_name">First Name</label>
<input type="text" id="first_name" name="first_name" class="form-input" placeholder="John" autocomplete="given-name"/>
<p class="form-error" id="first_name-error"></p>
</div>
<div class="form-group">
<label class="form-label" for="last_name">Last Name</label>
<input type="text" id="last_name" name="last_name" class="form-input" placeholder="Doe" autocomplete="family-name"/>
<p class="form-error" id="last_name-error"></p>
</div>
</div>
<div class="form-group">
<label class="form-label" for="email">Email</label>
<input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" autocomplete="email"/>
<p class="form-error" id="email-error"></p>
</div>
<div class="form-group">
<label class="form-label" for="password">Password</label>
<div class="password-wrapper">
<input type="password" id="password" name="password" class="form-input" placeholder="Create a password" autocomplete="password"/>
<button type="button" class="password-toggle" onclick="togglePasswordVisibility('password')" aria-label="Toggle password visibility">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
</button>
</div>
<div class="strength-bar"><div class="fill" id="password-strength" style="width:0%;background:#ef4444"></div></div>
<p class="form-hint" id="password-strength-text">Use 8+ characters with a mix of letters, numbers & symbols</p>
<p class="form-error" id="password-error"></p>
</div>
<div class="form-group">
<label class="form-label" for="confirm_password">Confirm Password</label>
<div class="password-wrapper">
<input type="password" id="confirm_password" name="confirm_password" class="form-input" placeholder="Confirm your password" autocomplete="confirm_password"/>
<button type="button" class="password-toggle" onclick="togglePasswordVisibility('confirm_password')" aria-label="Toggle password visibility">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
</button>
</div>
<p class="form-error" id="confirm_password-error"></p>
</div>
<div class="checkbox-wrapper mb-5">
<input type="checkbox" id="terms" name="terms"/>
<label for="terms" class="text-sm text-slate-600 dark:text-slate-400 cursor-pointer">I agree to the <a href="#" class="link">Terms of Service</a> and <a href="#" class="link">Privacy Policy</a></label>
</div>
<button type="submit" class="btn-primary" id="register-btn">Create Account</button>
</form>
<p class="text-center text-sm text-slate-500 dark:text-slate-400 mt-5">Already have an account? <a href="81-auth-login.html" class="link">Sign in</a></p>
</div>
</div>
<script src="common-loader.js"></script>
<script>

function handleRegister(e){
  e.preventDefault();
  var fn=document.getElementById('first_name'),ln=document.getElementById('last_name'),em=document.getElementById('email'),pw=document.getElementById('password'),cpw=document.getElementById('confirm_password'),terms=document.getElementById('terms');
  var valid=true;
  if(!fn.value.trim()){showFieldError('first_name','First name is required');valid=false}else{clearFieldError('first_name')}
  if(!ln.value.trim()){showFieldError('last_name','Last name is required');valid=false}else{clearFieldError('last_name')}
  if(!validateEmail(em.value)){showFieldError('email','Please enter a valid email');valid=false}else{clearFieldError('email')}
  if(!pw.value||pw.value.length<8){showFieldError('password','Password must be at least 8 characters');valid=false}else{clearFieldError('password')}
  if(pw.value!==cpw.value){showFieldError('confirm_password','Passwords do not match');valid=false}else{clearFieldError('confirm_password')}
  if(!terms.checked){showToast('Please accept the terms and conditions','error');valid=false}
  if(valid){
    var btn=document.getElementById('register-btn');
    btn.disabled=true;btn.textContent='Creating account...';
    setTimeout(function(){btn.disabled=false;btn.textContent='Create Account';showToast('Account created! Please verify your email.','success');setTimeout(function(){window.location.href='85-auth-verify-email.html'},1500)},1200);
  }
  return false;
}
var pwInput=document.getElementById('password');
pwInput.addEventListener('input',function(){
  var v=this.value,s=0,bar=document.getElementById('password-strength'),txt=document.getElementById('password-strength-text');
  if(v.length>=8)s+=25;if(/[A-Z]/.test(v))s+=25;if(/[0-9]/.test(v))s+=25;if(/[^A-Za-z0-9]/.test(v))s+=25;
  bar.style.width=s+'%';
  if(s<=25){bar.style.background='#ef4444';txt.textContent='Weak password'}
  else if(s<=50){bar.style.background='#f97316';txt.textContent='Fair password'}
  else if(s<=75){bar.style.background='#eab308';txt.textContent='Good password'}
  else{bar.style.background='#22c55e';txt.textContent='Strong password'}
});

</script>
</body>
</html>
